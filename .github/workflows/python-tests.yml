name: Release Contracts
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - uses: actions/setup-node@v4
        with: {node-version: '22'}
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Python, schema, migration, repository, and WordPress contracts
        run: python -m pytest -q
      - name: Release contract
        run: python scripts/check_contracts.py
      - name: Browser contract parity
        run: node scripts/check_browser_parity.js
      - name: JavaScript syntax
        run: |
          node --check wordpress/global-impact-catalyst-demo/assets/global-impact-catalyst-demo.js
          node --check wordpress/global-impact-catalyst-demo/assets/global-impact-catalyst-workspace.js
      - name: PHP syntax and workspace rendering
        run: |
          php -l wordpress/global-impact-catalyst-demo/global-impact-catalyst-demo.php
          php scripts/check_wordpress_instances.php
      - name: Portable smoke suite
        run: python scripts/smoke_test.py
